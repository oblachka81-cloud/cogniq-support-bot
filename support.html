<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>COGNIQ Support</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  font-family: 'Inter', -apple-system, sans-serif;
  color: #ddeeff;
  min-height: 100vh;
  padding: 20px 12px 40px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}
/* Футуристичный фон на всё тело */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: url('/support_bg.webp') center/cover no-repeat;
  filter: brightness(0.6) saturate(1.2);
  z-index: -1;
}
.support-card {
  max-width: 480px;
  width: 100%;
  padding: 24px 16px;
  position: relative;
  z-index: 1;
}
.logo { text-align: center; margin-bottom: 24px; }
.logo img { height: 80px; }
.title { font-size: 1.3rem; font-weight: 900; color: #00ffaa; text-align: center; margin-bottom: 6px; text-shadow: 0 0 10px rgba(0,255,170,0.5); }
.subtitle { font-size: 0.8rem; color: #aaccff; text-align: center; margin-bottom: 20px; }

/* Окошко для FAQ */
.modal-overlay {
  display: none;
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.8); z-index: 1000;
  justify-content: center; align-items: flex-start; padding-top: 60px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: rgba(10,20,38,0.95); backdrop-filter: blur(15px);
  border: 1px solid rgba(255,170,0,0.3); border-radius: 24px;
  padding: 20px; width: 90%; max-width: 480px;
  max-height: 80vh; overflow-y: auto; position: relative;
}
.modal-close {
  position: sticky; top: 0; float: right;
  background: none; border: none; color: #ffaa00; font-size: 1.5rem; cursor: pointer;
}

/* Кнопка FAQ */
.faq-open-btn {
  padding: 12px 24px; border: none; border-radius: 12px;
  color: #000; font-weight: 800; cursor: pointer; width: 100%;
  background: linear-gradient(90deg, #ffaa00, #ff6600);
  margin-bottom: 16px; font-size: 1rem;
}

/* FAQ */
.faq-card {
  background: rgba(10,20,38,0.7);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,170,0,0.2);
  border-radius: 20px;
  padding: 16px;
  margin-bottom: 8px;
  cursor: pointer;
}
.faq-q { font-size: 0.9rem; font-weight: 700; color: #ffaa00; }
.faq-a { font-size: 0.82rem; color: #ccddee; line-height: 1.5; display: none; margin-top: 8px; }
.faq-card.open .faq-a { display: block; }

/* Чат */
.chat-section {
  margin-top: 16px;
  background: transparent;
  backdrop-filter: none;
  border: none;
  padding: 0;
}
.chat-messages { max-height: 300px; overflow-y: auto; margin-bottom: 12px; }
.msg { margin-bottom: 8px; padding: 8px 12px; border-radius: 12px; font-size: 0.85rem; line-height: 1.4; max-width: 85%; }
.msg.user {
  background: rgba(0,255,170,0.2);
  margin-left: auto;
  text-align: right;
  color: #fff;
  display: flex;
  align-items: flex-end;
  flex-direction: row;
  gap: 8px;
}
.msg.user .user-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  flex-shrink: 0;
}
.msg.ai {
  background: transparent;
  margin-right: auto;
  color: #fff;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 8px 0;
  max-width: 100%;
}
.msg.ai .ai-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  flex-shrink: 0;
}
.msg.ai .ai-text {
  flex: 1;
}
.msg.user .user-name {
  font-size: 0.7rem;
  color: #8899cc;
  margin-bottom: 2px;
  text-align: right;
}
  .msg.ai .ai-text {
  color: #00ffcc;
  font-weight: 600;
}
.msg.user {
  color: #00cc88;
  font-weight: 500;
}
.chat-input-row { display: flex; gap: 8px; }
.chat-input {
  flex: 1; padding: 12px;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
  border: 1px solid rgba(0,255,170,0.3); border-radius: 12px;
  color: #fff; font-size: 0.9rem; outline: none;
}
.chat-input::placeholder { color: #8899cc; }
.btn {
  padding: 12px 16px; border: none; border-radius: 12px;
  color: #000; font-weight: 800; cursor: pointer;
  background: linear-gradient(90deg, #00ffaa, #00cc88);
}
/* Кнопки языков */
.lang-bar { display: flex; gap: 6px; justify-content: center; margin-bottom: 16px; }
.lang-btn {
  padding: 6px 12px;
  background: rgba(10,20,38,0.6); backdrop-filter: blur(4px);
  border: 1px solid rgba(255,170,0,0.2); border-radius: 20px;
  color: #8899cc; font-size: 0.75rem; cursor: pointer;
}
.lang-btn.active {
  background: rgba(0,255,170,0.2); border-color: rgba(0,255,170,0.5); color: #00ffaa;
}
</style>
</head>
<body>
<div class="support-card">
  <div class="logo"><img src="/support_avatar.png" alt="COGNIQ"></div>
  <div class="title">🛟 COGNIQ Support</div>
  <div class="subtitle">Официальная поддержка экосистемы NEURON</div>

  <div class="lang-bar" id="langBar">
    <button class="lang-btn active" data-lang="ru">🇷🇺 RU</button>
    <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
    <button class="lang-btn" data-lang="fr">🇫🇷 FR</button>
    <button class="lang-btn" data-lang="es">🇪🇸 ES</button>
  </div>

  <!-- Кнопка FAQ -->
  <button class="faq-open-btn" onclick="openFAQ()">❓ Частые вопросы (FAQ)</button>

  <!-- Окошко FAQ -->
  <div class="modal-overlay" id="faqModal" onclick="if(event.target===this) closeFAQ()">
    <div class="modal-box">
      <button class="modal-close" onclick="closeFAQ()">✕</button>
      <div id="faqList"></div>
    </div>
  </div>

  <div class="chat-section">
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-row">
      <input class="chat-input" id="chatInput" placeholder="Задайте вопрос...">
      <button class="btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
var FAQ = {
  ru: [
    { q: '🎮 Как начать играть?', a: 'Нажмите "Играть" в главном меню. Отвечайте на 10 вопросов викторины и зарабатывайте COGNIQ за правильные ответы!' },
    { q: '🪙 Что такое COGNIQ?', a: 'COGNIQ — игровой токен экосистемы NEURON на блокчейне TON. Им можно торговать, вкладывать в стейкинг и тратить в IMPULSE.' },
    { q: '🔥 Что такое Супер-игра?', a: 'Это режим с x15 наградами! Стоит 100 Stars или 1 USDT. Прохождение супер-игры дает право на вывод токенов.' },
    { q: '💸 Как вывести COGNIQ?', a: 'Подключите TON-кошелек в разделе "Кошелёк". Нужно минимум 1 тикет (получается за Супер-игру) и 1000 COGNIQ на балансе.' },
    { q: '⚡ Что такое IMPULSE?', a: 'IMPULSE — это 5 азартных игр (FORTUNA, SPARK, XXI, KRASH, MINES) внутри NEURON. Для ставок нужна валюта IMPULSE.' },
    { q: '💎 Чем VIP отличается от PREMIUM?', a: 'VIP (7 дней) дает +10 игр/день и 1 подсказку. PREMIUM (30 дней) дает +10 игр/день, 2 подсказки и эксклюзивную рамку аватара.' },
  ],
  en: [
    { q: '🎮 How to start playing?', a: 'Open Mini App "Play", answer quiz questions and earn COGNIQ!' },
    { q: '🪙 What is COGNIQ?', a: 'COGNIQ is the NEURON ecosystem token on TON blockchain.' },
    { q: '🔥 What is Super Game?', a: 'x15 reward mode! Costs 100 Stars or 1 USDT. Gives withdrawal tickets.' },
    { q: '💸 How to withdraw COGNIQ?', a: 'Connect TON wallet. You need 1 ticket (from Super Game) and 1000 COGNIQ.' },
    { q: '⚡ What is IMPULSE?', a: '5 games (FORTUNA, SPARK, XXI, KRASH, MINES) inside NEURON.' },
    { q: '💎 VIP vs PREMIUM?', a: 'VIP (7d): +10 games, 1 hint. PREMIUM (30d): +10 games, 2 hints, exclusive frame.' },
  ],
  fr: [
    { q: '🎮 Comment jouer?', a: 'Ouvre Mini App "Jouer", réponds aux questions et gagne des COGNIQ!' },
    { q: '🪙 Qu\'est-ce que COGNIQ?', a: 'COGNIQ est le token NEURON sur TON.' },
    { q: '🔥 Qu\'est-ce que Super Jeu?', a: 'Mode x15 récompenses! Coûte 100 Stars ou 1 USDT.' },
    { q: '💸 Comment retirer COGNIQ?', a: 'Connecte le portefeuille TON. 1 ticket + 1000 COGNIQ requis.' },
    { q: '⚡ Qu\'est-ce que IMPULSE?', a: '5 jeux (FORTUNA, SPARK, XXI, KRASH, MINES).' },
    { q: '💎 VIP vs PREMIUM?', a: 'VIP (7j): +10 parties, 1 indice. PREMIUM (30j): +10 parties, 2 indices, cadre.' },
  ],
  es: [
    { q: '🎮 ¿Cómo jugar?', a: 'Abre Mini App "Jugar", responde preguntas y gana COGNIQ!' },
    { q: '🪙 ¿Qué es COGNIQ?', a: 'COGNIQ es el token NEURON en TON.' },
    { q: '🔥 ¿Qué es Super Juego?', a: 'Modo x15 recompensas! Cuesta 100 Stars o 1 USDT.' },
    { q: '💸 ¿Cómo retirar COGNIQ?', a: 'Conecta billetera TON. Necesitas 1 ticket + 1000 COGNIQ.' },
    { q: '⚡ ¿Qué es IMPULSE?', a: '5 juegos (FORTUNA, SPARK, XXI, KRASH, MINES).' },
    { q: '💎 ¿VIP vs PREMIUM?', a: 'VIP (7d): +10 partidas, 1 pista. PREMIUM (30d): +10 partidas, 2 pistas, marco.' },
  ]
};

var UI_STRINGS = {
  ru: { faq_btn: '❓ Частые вопросы (FAQ)', input_ph: 'Задайте вопрос...', ai_err: 'Извините, я не смог ответить. Попробуйте позже.', conn_err: 'Ошибка связи с сервером.', title: 'COGNIQ Support', subtitle: 'Официальная поддержка экосистемы NEURON' },
  en: { faq_btn: '❓ FAQ', input_ph: 'Ask a question...', ai_err: 'Sorry, I could not answer. Try again later.', conn_err: 'Connection error.', title: 'COGNIQ Support', subtitle: 'Official NEURON Ecosystem Support' },
  fr: { faq_btn: '❓ FAQ', input_ph: 'Posez une question...', ai_err: 'Désolé, je n\'ai pas pu répondre. Réessayez plus tard.', conn_err: 'Erreur de connexion.', title: 'Support COGNIQ', subtitle: 'Support officiel de l\'écosystème NEURON' },
  es: { faq_btn: '❓ FAQ', input_ph: 'Haz una pregunta...', ai_err: 'Lo siento, no pude responder. Inténtalo más tarde.', conn_err: 'Error de conexión.', title: 'Soporte COGNIQ', subtitle: 'Soporte oficial del ecosistema NEURON' }
};

var currentLang = localStorage.getItem('support_lang') || 'ru';
if (!FAQ[currentLang]) currentLang = 'ru';

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('support_lang', lang);
  document.querySelectorAll('.lang-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.lang === lang); });
  renderFAQ();
  applyUILang();
}

function applyUILang() {
  var str = UI_STRINGS[currentLang] || UI_STRINGS['ru'];
  var faqBtn = document.querySelector('.faq-open-btn');
  if (faqBtn) faqBtn.textContent = str.faq_btn;
  var chatInput = document.getElementById('chatInput');
  if (chatInput) chatInput.placeholder = str.input_ph;
  document.title = str.title;
  var subtitle = document.querySelector('.subtitle');
  if (subtitle) subtitle.textContent = str.subtitle;
}

function renderFAQ() {
  var faq = FAQ[currentLang];
  document.getElementById('faqList').innerHTML = faq.map(function(item) {
    return '<div class="faq-card" onclick="this.classList.toggle(\'open\')"><div class="faq-q">' + item.q + '</div><div class="faq-a">' + item.a + '</div></div>';
  }).join('');
}

function addMessage(text, type, name, avatar) {
  var container = document.getElementById('chatMessages');
  var div = document.createElement('div');
  div.className = 'msg ' + (type || 'user');

  if (type === 'ai') {
    div.innerHTML = '<img class="ai-avatar" src="/support_avatar.png" alt="AI"><div class="ai-text">' + text + '</div>';
  } else {
    var avatarHtml = avatar ? '<img class="user-avatar" src="' + avatar + '" alt="You">' : '';
    div.innerHTML = '<div style="flex:1">' + (name ? '<div class="user-name">' + name + '</div>' : '') + text + '</div>' + avatarHtml;
  }
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function sendMessage() {
  var input = document.getElementById('chatInput');
  var msg = input.value.trim();
  if (!msg) return;

  addMessage(msg, 'user', USER_NAME, USER_AVATAR);
  input.value = '';

  fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: msg, lang: currentLang })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.reply) {
      addMessage(data.reply, 'ai');
    } else {
      addMessage(UI_STRINGS[currentLang].ai_err, 'ai');
    }
  })
  .catch(function() {
    addMessage(UI_STRINGS[currentLang].conn_err, 'ai');
  });
}

document.getElementById('langBar').addEventListener('click', function(e) {
  var btn = e.target.closest('.lang-btn');
  if (!btn) return;
  setLang(btn.dataset.lang);
});

function openFAQ() { document.getElementById('faqModal').classList.add('open'); }
function closeFAQ() { document.getElementById('faqModal').classList.remove('open'); }

document.querySelectorAll('.lang-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.lang === currentLang); });
renderFAQ();
applyUILang();
 var USER_ID = null;
var urlParams = new URLSearchParams(window.location.search);
USER_ID = urlParams.get('user_id');

try {
  var tg = window.Telegram?.WebApp;
  if (!USER_ID && tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
    USER_ID = tg.initDataUnsafe.user.id;
  }
} catch(e) {}

var USER_NAME = 'You';
var USER_AVATAR = null;
if (USER_ID) {
  fetch('/api/user-info?user_id=' + USER_ID)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.name) USER_NAME = data.name;
      if (data.avatar) USER_AVATAR = data.avatar;
    })
    .catch(function() {});
}
</script>
</body>
</html>
