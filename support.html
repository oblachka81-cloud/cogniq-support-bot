<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>COGNIQ Support</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  font-family: 'Inter', -apple-system, sans-serif;
  color: #ddeeff;
  min-height: 100vh;
  padding: 20px 12px 40px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}
/* Футуристичный фон на всё тело */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: url('/support_bg.webp') center/cover no-repeat;
  z-index: -1;
}
.support-card {
  max-width: 480px;
  width: 100%;
  padding: 24px 16px;
  position: relative;
  z-index: 1;
}
.logo { text-align: center; margin-bottom: 24px; }
.logo img { height: 80px; }
.title { font-size: 1.3rem; font-weight: 900; color: #00ffaa; text-align: center; margin-bottom: 6px; text-shadow: 0 0 10px rgba(0,255,170,0.5); }
.subtitle { font-size: 0.8rem; color: #aaccff; text-align: center; margin-bottom: 20px; }
/* FAQ */
.faq-card {
  background: rgba(10,20,38,0.7);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,170,0,0.2);
  border-radius: 20px;
  padding: 16px;
  margin-bottom: 12px;
  cursor: pointer;
}
.faq-q { font-size: 0.9rem; font-weight: 700; color: #ffaa00; }
.faq-a { font-size: 0.82rem; color: #ccddee; line-height: 1.5; display: none; margin-top: 8px; }
.faq-card.open .faq-a { display: block; }
/* Чат */
.chat-section {
  margin-top: 16px;
  background: rgba(10,20,38,0.7);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,170,0,0.2);
  border-radius: 20px;
  padding: 16px;
}
.chat-messages { max-height: 300px; overflow-y: auto; margin-bottom: 12px; }
.msg { margin-bottom: 8px; padding: 8px 12px; border-radius: 12px; font-size: 0.85rem; line-height: 1.4; max-width: 85%; }
.msg.user { background: rgba(0,255,170,0.2); margin-left: auto; text-align: right; color: #fff; }
.msg.ai { background: rgba(255,170,0,0.2); margin-right: auto; color: #fff; }
.chat-input-row { display: flex; gap: 8px; }
.chat-input {
  flex: 1; padding: 12px;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
  border: 1px solid rgba(0,255,170,0.3); border-radius: 12px;
  color: #fff; font-size: 0.9rem; outline: none;
}
.chat-input::placeholder { color: #8899cc; }
.btn {
  padding: 12px 16px; border: none; border-radius: 12px;
  color: #000; font-weight: 800; cursor: pointer;
  background: linear-gradient(90deg, #00ffaa, #00cc88);
}
/* Кнопки языков */
.lang-bar { display: flex; gap: 6px; justify-content: center; margin-bottom: 16px; }
.lang-btn {
  padding: 6px 12px;
  background: rgba(10,20,38,0.6); backdrop-filter: blur(4px);
  border: 1px solid rgba(255,170,0,0.2); border-radius: 20px;
  color: #8899cc; font-size: 0.75rem; cursor: pointer;
}
.lang-btn.active {
  background: rgba(0,255,170,0.2); border-color: rgba(0,255,170,0.5); color: #00ffaa;
}
</style>
</head>
<body>
<div class="support-card">
  <div class="logo"><img src="/support_avatar.png" alt="COGNIQ"></div>
  <div class="title">🛟 COGNIQ Support</div>
  <div class="subtitle">Официальная поддержка экосистемы NEURON</div>

  <div class="lang-bar" id="langBar">
    <button class="lang-btn active" data-lang="ru">🇷🇺 RU</button>
    <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
    <button class="lang-btn" data-lang="fr">🇫🇷 FR</button>
    <button class="lang-btn" data-lang="es">🇪🇸 ES</button>
  </div>

  <div id="faqList"></div>

  <div class="chat-section">
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-row">
      <input class="chat-input" id="chatInput" placeholder="Задайте вопрос...">
      <button class="btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
var FAQ = {
  ru: [
    { q: '🎮 Как начать играть?', a: 'Нажмите "Играть" в главном меню. Отвечайте на 10 вопросов викторины и зарабатывайте COGNIQ за правильные ответы!' },
    { q: '🪙 Что такое COGNIQ?', a: 'COGNIQ — игровой токен экосистемы NEURON на блокчейне TON. Им можно торговать, вкладывать в стейкинг и тратить в IMPULSE.' },
    { q: '🔥 Что такое Супер-игра?', a: 'Это режим с x15 наградами! Стоит 100 Stars или 1 USDT. Прохождение супер-игры дает право на вывод токенов.' },
    { q: '💸 Как вывести COGNIQ?', a: 'Подключите TON-кошелек в разделе "Кошелёк". Нужно минимум 1 тикет (получается за Супер-игру) и 1000 COGNIQ на балансе.' },
    { q: '⚡ Что такое IMPULSE?', a: 'IMPULSE — это 5 азартных игр (FORTUNA, SPARK, XXI, KRASH, MINES) внутри NEURON. Для ставок нужна валюта IMPULSE.' },
    { q: '💎 Чем VIP отличается от PREMIUM?', a: 'VIP (7 дней) дает +10 игр/день и 1 подсказку. PREMIUM (30 дней) дает +10 игр/день, 2 подсказки и эксклюзивную рамку аватара.' },
  ],
  en: [
    { q: '🎮 How to start playing?', a: 'Open Mini App "Play", answer quiz questions and earn COGNIQ!' },
    { q: '🪙 What is COGNIQ?', a: 'COGNIQ is the NEURON ecosystem token on TON blockchain.' },
    { q: '🔥 What is Super Game?', a: 'x15 reward mode! Costs 100 Stars or 1 USDT. Gives withdrawal tickets.' },
    { q: '💸 How to withdraw COGNIQ?', a: 'Connect TON wallet. You need 1 ticket (from Super Game) and 1000 COGNIQ.' },
    { q: '⚡ What is IMPULSE?', a: '5 games (FORTUNA, SPARK, XXI, KRASH, MINES) inside NEURON.' },
    { q: '💎 VIP vs PREMIUM?', a: 'VIP (7d): +10 games, 1 hint. PREMIUM (30d): +10 games, 2 hints, exclusive frame.' },
  ],
  fr: [
    { q: '🎮 Comment jouer?', a: 'Ouvre Mini App "Jouer", réponds aux questions et gagne des COGNIQ!' },
    { q: '🪙 Qu\'est-ce que COGNIQ?', a: 'COGNIQ est le token NEURON sur TON.' },
    { q: '🔥 Qu\'est-ce que Super Jeu?', a: 'Mode x15 récompenses! Coûte 100 Stars ou 1 USDT.' },
    { q: '💸 Comment retirer COGNIQ?', a: 'Connecte le portefeuille TON. 1 ticket + 1000 COGNIQ requis.' },
    { q: '⚡ Qu\'est-ce que IMPULSE?', a: '5 jeux (FORTUNA, SPARK, XXI, KRASH, MINES).' },
    { q: '💎 VIP vs PREMIUM?', a: 'VIP (7j): +10 parties, 1 indice. PREMIUM (30j): +10 parties, 2 indices, cadre.' },
  ],
  es: [
    { q: '🎮 ¿Cómo jugar?', a: 'Abre Mini App "Jugar", responde preguntas y gana COGNIQ!' },
    { q: '🪙 ¿Qué es COGNIQ?', a: 'COGNIQ es el token NEURON en TON.' },
    { q: '🔥 ¿Qué es Super Juego?', a: 'Modo x15 recompensas! Cuesta 100 Stars o 1 USDT.' },
    { q: '💸 ¿Cómo retirar COGNIQ?', a: 'Conecta billetera TON. Necesitas 1 ticket + 1000 COGNIQ.' },
    { q: '⚡ ¿Qué es IMPULSE?', a: '5 juegos (FORTUNA, SPARK, XXI, KRASH, MINES).' },
    { q: '💎 ¿VIP vs PREMIUM?', a: 'VIP (7d): +10 partidas, 1 pista. PREMIUM (30d): +10 partidas, 2 pistas, marco.' },
  ]
};

var currentLang = localStorage.getItem('support_lang') || 'ru';
if (!FAQ[currentLang]) currentLang = 'ru';

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('support_lang', lang);
  document.querySelectorAll('.lang-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.lang === lang); });
  renderFAQ();
}

function renderFAQ() {
  var faq = FAQ[currentLang];
  document.getElementById('faqList').innerHTML = faq.map(function(item) {
    return '<div class="faq-card" onclick="this.classList.toggle(\'open\')"><div class="faq-q">' + item.q + '</div><div class="faq-a">' + item.a + '</div></div>';
  }).join('');
}

function addMessage(text, type) {
  var container = document.getElementById('chatMessages');
  var div = document.createElement('div');
  div.className = 'msg ' + (type || 'user');
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function sendMessage() {
  var input = document.getElementById('chatInput');
  var msg = input.value.trim();
  if (!msg) return;

  addMessage(msg, 'user');
  input.value = '';

  fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: msg, lang: currentLang })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.reply) {
      addMessage(data.reply, 'ai');
    } else {
      addMessage('Извините, я не смог ответить. Попробуйте позже.', 'ai');
    }
  })
  .catch(function() {
    addMessage('Ошибка связи с сервером.', 'ai');
  });
}

document.getElementById('langBar').addEventListener('click', function(e) {
  var btn = e.target.closest('.lang-btn');
  if (!btn) return;
  setLang(btn.dataset.lang);
});

document.querySelectorAll('.lang-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.lang === currentLang); });
renderFAQ();
</script>
</body>
</html>
