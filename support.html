<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>COGNIQ Support</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #07111f; font-family: 'Inter', -apple-system, sans-serif; color: #ddeeff; min-height: 100vh; padding: 20px 12px 40px; display: flex; justify-content: center; }
.support-card { max-width: 480px; width: 100%; padding: 24px 16px; }
.logo { text-align: center; margin-bottom: 24px; }
.logo img { height: 80px; }
.title { font-size: 1.3rem; font-weight: 900; color: #00ffaa; text-align: center; margin-bottom: 6px; }
.subtitle { font-size: 0.8rem; color: #5577aa; text-align: center; margin-bottom: 20px; }
.faq-card { background: rgba(10,20,38,0.8); border: 1px solid rgba(255,170,0,0.12); border-radius: 20px; padding: 16px; margin-bottom: 12px; cursor: pointer; }
.faq-q { font-size: 0.9rem; font-weight: 700; color: #ffaa00; }
.faq-a { font-size: 0.82rem; color: #8899bb; line-height: 1.5; display: none; margin-top: 8px; }
.faq-card.open .faq-a { display: block; }
.chat-section { margin-top: 16px; background: rgba(10,20,38,0.8); border: 1px solid rgba(255,170,0,0.12); border-radius: 20px; padding: 16px; }
.chat-messages { max-height: 300px; overflow-y: auto; margin-bottom: 12px; }
.msg { margin-bottom: 8px; padding: 8px 12px; border-radius: 12px; font-size: 0.85rem; line-height: 1.4; max-width: 85%; }
.msg.user { background: rgba(0,255,170,0.15); margin-left: auto; text-align: right; color: #ddeeff; }
.msg.ai { background: rgba(255,170,0,0.1); margin-right: auto; color: #ddeeff; }
.chat-input-row { display: flex; gap: 8px; }
.chat-input { flex: 1; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(0,255,170,0.2); border-radius: 12px; color: #ddeeff; font-size: 0.9rem; outline: none; }
.chat-input::placeholder { color: #5577aa; }
.btn { padding: 12px 16px; border: none; border-radius: 12px; color: #000; font-weight: 800; cursor: pointer; background: linear-gradient(90deg, #00ffaa, #00cc88); }
.lang-bar { display: flex; gap: 6px; justify-content: center; margin-bottom: 16px; }
.lang-btn { padding: 6px 12px; background: rgba(10,20,38,0.6); border: 1px solid rgba(255,170,0,0.12); border-radius: 20px; color: #5577aa; font-size: 0.75rem; cursor: pointer; }
.lang-btn.active { background: rgba(0,255,170,0.15); border-color: rgba(0,255,170,0.4); color: #00ffaa; }
</style>
</head>
<body>
<div class="support-card">
  <div class="logo"><img src="/support_avatar.png" alt="COGNIQ"></div>
  <div class="title">🛟 COGNIQ Support</div>
  <div class="subtitle">Официальная поддержка экосистемы NEURON</div>

  <div class="lang-bar" id="langBar">
    <button class="lang-btn active" data-lang="ru">🇷🇺 RU</button>
    <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
    <button class="lang-btn" data-lang="fr">🇫🇷 FR</button>
    <button class="lang-btn" data-lang="es">🇪🇸 ES</button>
  </div>

  <div id="faqList"></div>

  <div class="chat-section">
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-row">
      <input class="chat-input" id="chatInput" placeholder="Задайте вопрос...">
      <button class="btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
var FAQ = {
  ru: [
    { q: '🎮 Как играть?', a: 'Открой Mini App "Играть", отвечай на вопросы викторины и зарабатывай COGNIQ!' },
    { q: '🪙 Что такое COGNIQ?', a: 'COGNIQ — токен экосистемы NEURON на блокчейне TON.' },
  ],
  en: [
    { q: '🎮 How to play?', a: 'Open Mini App "Play", answer quiz questions and earn COGNIQ!' },
    { q: '🪙 What is COGNIQ?', a: 'COGNIQ is the NEURON ecosystem token on TON blockchain.' },
  ],
  fr: [
    { q: '🎮 Comment jouer?', a: 'Ouvre Mini App "Jouer", réponds aux questions et gagne des COGNIQ!' },
    { q: '🪙 Qu\'est-ce que COGNIQ?', a: 'COGNIQ est le token NEURON sur TON.' },
  ],
  es: [
    { q: '🎮 ¿Cómo jugar?', a: 'Abre Mini App "Jugar", responde preguntas y gana COGNIQ!' },
    { q: '🪙 ¿Qué es COGNIQ?', a: 'COGNIQ es el token NEURON en TON.' },
  ]
};

var currentLang = localStorage.getItem('support_lang') || 'ru';
if (!FAQ[currentLang]) currentLang = 'ru';

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('support_lang', lang);
  document.querySelectorAll('.lang-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.lang === lang); });
  renderFAQ();
}

function renderFAQ() {
  var faq = FAQ[currentLang];
  document.getElementById('faqList').innerHTML = faq.map(function(item) {
    return '<div class="faq-card" onclick="this.classList.toggle(\'open\')"><div class="faq-q">' + item.q + '</div><div class="faq-a">' + item.a + '</div></div>';
  }).join('');
}

function addMessage(text, type) {
  var container = document.getElementById('chatMessages');
  var div = document.createElement('div');
  div.className = 'msg ' + (type || 'user');
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function sendMessage() {
  var input = document.getElementById('chatInput');
  var msg = input.value.trim();
  if (!msg) return;

  addMessage(msg, 'user');
  input.value = '';

  fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: msg, lang: currentLang })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.reply) {
      addMessage(data.reply, 'ai');
    } else {
      addMessage('Извините, я не смог ответить. Попробуйте позже.', 'ai');
    }
  })
  .catch(function() {
    addMessage('Ошибка связи с сервером.', 'ai');
  });
}

document.getElementById('langBar').addEventListener('click', function(e) {
  var btn = e.target.closest('.lang-btn');
  if (!btn) return;
  setLang(btn.dataset.lang);
});

document.querySelectorAll('.lang-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.lang === currentLang); });
renderFAQ();
</script>
</body>
</html>
