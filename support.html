<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>COGNIQ Support</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  font-family: 'Inter', -apple-system, sans-serif;
  color: #ddeeff;
  min-height: 100vh;
  padding: 20px 12px 40px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: url('https://cogniqai.bothost.tech/support_bg.webp') center/cover no-repeat;
  filter: brightness(0.6) saturate(1.2);
  z-index: -1;
}
.support-card {
  max-width: 480px;
  width: 100%;
  padding: 24px 16px;
  position: relative;
  z-index: 1;
}
.logo { text-align: center; margin-bottom: 24px; }
.logo img { height: 130px; }
.title { font-size: 1.3rem; font-weight: 900; color: #00ffaa; text-shadow: 0 0 10px rgba(0,255,170,0.5); }
.subtitle { font-size: 0.8rem; color: #aaccff; text-align: center; margin-bottom: 20px; }

/* Кнопка назад */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(0,255,170,0.1);
  border: 1px solid rgba(0,255,170,0.25);
  border-radius: 20px;
  padding: 6px 14px;
  color: #00ffaa;
  text-decoration: none;
  font-size: 0.8rem;
  font-weight: 700;
  white-space: nowrap;
  flex-shrink: 0;
}

/* Режимы */
.mode-bar { display: flex; gap: 6px; margin-bottom: 16px; }
.mode-btn {
  flex: 1; padding: 10px 8px; border-radius: 12px;
  font-size: 0.82rem; font-weight: 700; cursor: pointer;
  background: rgba(10,20,38,0.6); backdrop-filter: blur(4px);
  border: 1px solid rgba(255,170,0,0.2); color: #8899cc;
  transition: all 0.2s;
}
.mode-btn.active-support { background: rgba(0,255,170,0.15); border-color: rgba(0,255,170,0.5); color: #00ffaa; }
.mode-btn.active-chat { background: rgba(255,170,0,0.15); border-color: rgba(255,170,0,0.5); color: #ffaa00; }

/* FAQ */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: flex-start; padding-top: 60px; }
.modal-overlay.open { display: flex; }
.modal-box { background: rgba(10,20,38,0.95); backdrop-filter: blur(15px); border: 1px solid rgba(255,170,0,0.3); border-radius: 24px; padding: 20px; width: 90%; max-width: 480px; max-height: 80vh; overflow-y: auto; position: relative; }
.modal-close { position: sticky; top: 0; float: right; background: none; border: none; color: #ffaa00; font-size: 1.5rem; cursor: pointer; }
.faq-card { background: rgba(10,20,38,0.7); backdrop-filter: blur(8px); border: 1px solid rgba(255,170,0,0.2); border-radius: 20px; padding: 16px; margin-bottom: 8px; cursor: pointer; }
.faq-q { font-size: 0.9rem; font-weight: 700; color: #ffaa00; }
.faq-a { font-size: 0.82rem; color: #ccddee; line-height: 1.5; display: none; margin-top: 8px; }
.faq-card.open .faq-a { display: block; }

/* Чат */
.chat-section { margin-top: 16px; background: transparent; border: none; padding: 0; }
.chat-messages { max-height: 300px; overflow-y: auto; margin-bottom: 12px; }
.msg { margin-bottom: 8px; padding: 8px 12px; border-radius: 12px; font-size: 0.85rem; line-height: 1.4; max-width: 85%; }
.msg.user {
  background: transparent;
  margin-left: auto;
  text-align: right;
  color: #00cc88;
  font-weight: 500;
  display: flex;
  align-items: flex-end;
  flex-direction: row;
  gap: 8px;
  border-right: 2px solid rgba(0,255,170,0.3);
  padding-right: 12px;
}
.msg.user .user-avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; }
.msg.ai { background: transparent; margin-right: auto; color: #fff; display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; max-width: 100%; }
.msg.ai .ai-avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; }
.msg.ai .ai-text { flex: 1; color: #00ffcc; font-weight: 600; }
.msg.user { color: #00cc88; font-weight: 500; }
.msg.user .user-name { font-size: 0.7rem; color: #8899cc; margin-bottom: 2px; text-align: right; }
.chat-input-row { display: flex; gap: 8px; }
.chat-input { flex: 1; padding: 12px; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); border: 1px solid rgba(0,255,170,0.3); border-radius: 12px; color: #fff; font-size: 0.9rem; outline: none; }
.chat-input::placeholder { color: #8899cc; }
.btn { padding: 12px 16px; border: none; border-radius: 12px; color: #000; font-weight: 800; cursor: pointer; background: linear-gradient(90deg, #00ffaa, #00cc88); }

/* Языки */
.lang-bar { display: flex; gap: 6px; justify-content: center; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="support-card">
  <div class="logo"><img src="/support_avatar.png" alt="COGNIQ"></div>
  <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px;flex-wrap:wrap;">
    <a href="https://t.me/NeuronGame_bot" class="back-link">← NEURON</a>
    <div class="title" style="margin-bottom:0;">🛟 COGNIQ Support</div>
  </div>
  <div class="subtitle">Официальная поддержка экосистемы NEURON</div>

  <div class="lang-bar" id="langBar" style="display:flex;gap:6px;justify-content:center;margin-bottom:16px;">
    <button data-lang="ru" style="background:none;border:none;padding:0;cursor:pointer;filter:brightness(1.3)drop-shadow(0 0 6px #f472b6);">
        <img src="/support_lang_ru.png" style="height:34px;width:auto;display:block;">
    </button>
    <button data-lang="en" style="background:none;border:none;padding:0;cursor:pointer;">
        <img src="/support_lang_en.png" style="height:34px;width:auto;display:block;">
    </button>
    <button data-lang="fr" style="background:none;border:none;padding:0;cursor:pointer;">
        <img src="/support_lang_fr.png" style="height:34px;width:auto;display:block;">
    </button>
    <button data-lang="es" style="background:none;border:none;padding:0;cursor:pointer;">
        <img src="/support_lang_es.png" style="height:34px;width:auto;display:block;">
    </button>
</div>

  <button onclick="openFAQ()" style="background:none;border:none;padding:0;cursor:pointer;width:100%;margin-bottom:16px;">
    <img src="/support_faq_btn.png" style="width:100%;height:auto;display:block;">
</button>

  <div class="modal-overlay" id="faqModal" onclick="if(event.target===this) closeFAQ()">
    <div class="modal-box">
      <button class="modal-close" onclick="closeFAQ()">✕</button>
      <div id="faqList"></div>
    </div>
  </div>

  <div class="mode-bar" style="display:flex;gap:6px;margin-bottom:16px;">
    <button id="modeSupport" onclick="setMode('support')" style="background:none;border:none;padding:0;cursor:pointer;flex:1;filter:brightness(1.3)drop-shadow(0 0 6px #f472b6);">
        <img src="/support_mode_support.png" style="width:100%;height:auto;display:block;">
    </button>
    <button id="modeChat" onclick="setMode('chat')" style="background:none;border:none;padding:0;cursor:pointer;flex:1;">
        <img src="/support_mode_chat.png" style="width:100%;height:auto;display:block;">
    </button>
</div>

  <div class="chat-section">
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-row">
      <input class="chat-input" id="chatInput" placeholder="Задайте вопрос...">
      <button class="btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
var FAQ = {
  ru: [
    { q: '🎮 Как начать играть?', a: 'Нажмите "Играть" в главном меню. Отвечайте на 10 вопросов викторины и зарабатывайте COGNIQ за правильные ответы!' },
    { q: '🪙 Что такое COGNIQ?', a: 'COGNIQ — игровой токен экосистемы NEURON на блокчейне TON.' },
    { q: '🔥 Что такое Супер-игра?', a: 'Это режим с x15 наградами! Стоит 100 Stars или 1 USDT.' },
    { q: '💸 Как вывести COGNIQ?', a: 'Подключите TON-кошелек в разделе "Кошелёк". Нужен 1 тикет и 1000 COGNIQ.' },
    { q: '⚡ Что такое IMPULSE?', a: 'IMPULSE — это 5 игр (FORTUNA, SPARK, XXI, KRASH, MINES). Валюта: IMPULSE.' },
    { q: '💎 Чем VIP отличается от PREMIUM?', a: 'VIP (7 дней): +10 игр/день. PREMIUM (30 дней): +10 игр/день, рамка.' },
  ],
  en: [
    { q: '🎮 How to start playing?', a: 'Open "Play", answer quiz questions and earn COGNIQ!' },
    { q: '🪙 What is COGNIQ?', a: 'COGNIQ is the NEURON ecosystem token on TON blockchain.' },
    { q: '🔥 What is Super Game?', a: 'x15 reward mode! Costs 100 Stars or 1 USDT.' },
    { q: '💸 How to withdraw COGNIQ?', a: 'Connect TON wallet. You need 1 ticket and 1000 COGNIQ.' },
    { q: '⚡ What is IMPULSE?', a: '5 games (FORTUNA, SPARK, XXI, KRASH, MINES). Currency: IMPULSE.' },
    { q: '💎 VIP vs PREMIUM?', a: 'VIP (7d): +10 games/day. PREMIUM (30d): +10 games/day, frame.' },
  ],
  fr: [
    { q: '🎮 Comment jouer?', a: 'Ouvre "Jouer", réponds aux questions et gagne des COGNIQ!' },
    { q: '🪙 Qu\'est-ce que COGNIQ?', a: 'COGNIQ est le token NEURON sur TON.' },
    { q: '🔥 Qu\'est-ce que Super Jeu?', a: 'Mode x15 récompenses! Coûte 100 Stars ou 1 USDT.' },
    { q: '💸 Comment retirer COGNIQ?', a: 'Connecte le portefeuille TON. 1 ticket + 1000 COGNIQ.' },
    { q: '⚡ Qu\'est-ce que IMPULSE?', a: '5 jeux (FORTUNA, SPARK, XXI, KRASH, MINES).' },
    { q: '💎 VIP vs PREMIUM?', a: 'VIP (7j): +10 parties/jour. PREMIUM (30j): +10 parties/jour, cadre.' },
  ],
  es: [
    { q: '🎮 ¿Cómo jugar?', a: 'Abre "Jugar", responde preguntas y gana COGNIQ!' },
    { q: '🪙 ¿Qué es COGNIQ?', a: 'COGNIQ es el token NEURON en TON.' },
    { q: '🔥 ¿Qué es Super Juego?', a: 'Modo x15 recompensas! Cuesta 100 Stars o 1 USDT.' },
    { q: '💸 ¿Cómo retirar COGNIQ?', a: 'Conecta billetera TON. 1 ticket + 1000 COGNIQ.' },
    { q: '⚡ ¿Qué es IMPULSE?', a: '5 juegos (FORTUNA, SPARK, XXI, KRASH, MINES).' },
    { q: '💎 ¿VIP vs PREMIUM?', a: 'VIP (7d): +10 partidas/día. PREMIUM (30d): +10 partidas/día, marco.' },
  ]
};

var UI_STRINGS = {
  ru: { faq_btn: '❓ Частые вопросы (FAQ)', input_ph: 'Задайте вопрос...', ai_err: 'Извините, я не смог ответить.', conn_err: 'Ошибка связи.', title: 'COGNIQ Support', subtitle: 'Официальная поддержка экосистемы NEURON', back_btn: '← NEURON' },
  en: { faq_btn: '❓ FAQ', input_ph: 'Ask a question...', ai_err: 'Sorry, I could not answer.', conn_err: 'Connection error.', title: 'COGNIQ Support', subtitle: 'Official NEURON Ecosystem Support', back_btn: '← NEURON' },
  fr: { faq_btn: '❓ FAQ', input_ph: 'Posez une question...', ai_err: 'Désolé, je n\'ai pas pu répondre.', conn_err: 'Erreur de connexion.', title: 'Support COGNIQ', subtitle: 'Support officiel NEURON', back_btn: '← NEURON' },
  es: { faq_btn: '❓ FAQ', input_ph: 'Haz una pregunta...', ai_err: 'Lo siento, no pude responder.', conn_err: 'Error de conexión.', title: 'Soporte COGNIQ', subtitle: 'Soporte oficial NEURON', back_btn: '← NEURON' }
};

var currentLang = localStorage.getItem('support_lang') || 'ru';
if (!FAQ[currentLang]) currentLang = 'ru';
var chatMode = 'support';

function setMode(mode) {
  chatMode = mode;
  var supportBtn = document.getElementById('modeSupport');
  var chatBtn = document.getElementById('modeChat');
  
  if (mode === 'support') {
    supportBtn.style.filter = 'brightness(1.3) drop-shadow(0 0 6px #f472b6)';
    chatBtn.style.filter = 'brightness(0.5)';
  } else {
    chatBtn.style.filter = 'brightness(1.3) drop-shadow(0 0 6px #f472b6)';
    supportBtn.style.filter = 'brightness(0.5)';
  }
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('support_lang', lang);
  
  // Подсветка активной кнопки
  document.querySelectorAll('#langBar button').forEach(function(btn) {
    var isActive = btn.dataset.lang === lang;
    btn.style.filter = isActive ? 'brightness(1.3) drop-shadow(0 0 6px #f472b6)' : 'none';
  });
  
  renderFAQ();
  applyUILang();
}

function applyUILang() {
  var str = UI_STRINGS[currentLang] || UI_STRINGS['ru'];
  var faqBtn = document.querySelector('.faq-open-btn');
  if (faqBtn) faqBtn.textContent = str.faq_btn;
  var chatInput = document.getElementById('chatInput');
  if (chatInput) chatInput.placeholder = str.input_ph;
  document.title = str.title;
  var subtitle = document.querySelector('.subtitle');
  if (subtitle) subtitle.textContent = str.subtitle;
  var backBtn = document.querySelector('.back-link');
  if (backBtn) backBtn.textContent = str.back_btn;
}

function renderFAQ() {
  var faq = FAQ[currentLang];
  document.getElementById('faqList').innerHTML = faq.map(function(item) {
    return '<div class="faq-card" onclick="this.classList.toggle(\'open\')"><div class="faq-q">' + item.q + '</div><div class="faq-a">' + item.a + '</div></div>';
  }).join('');
}

function addMessage(text, type, name, avatar) {
  var container = document.getElementById('chatMessages');
  var div = document.createElement('div');
  div.className = 'msg ' + (type || 'user');
  if (type === 'ai') {
    div.innerHTML = '<img class="ai-avatar" src="/support_avatar.png" alt="AI"><div class="ai-text">' + text + '</div>';
  } else {
    var avatarHtml = avatar ? '<img class="user-avatar" src="' + avatar + '" alt="You">' : '';
    div.innerHTML = '<div style="flex:1">' + (name ? '<div class="user-name">' + name + '</div>' : '') + text + '</div>' + avatarHtml;
  }
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function sendMessage() {
  var input = document.getElementById('chatInput');
  var msg = input.value.trim();
  if (!msg) return;
  addMessage(msg, 'user', USER_NAME, USER_AVATAR);
  input.value = '';
  fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: msg, lang: currentLang, mode: chatMode })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.reply) { addMessage(data.reply, 'ai'); }
    else { addMessage(UI_STRINGS[currentLang].ai_err, 'ai'); }
  })
  .catch(function() { addMessage(UI_STRINGS[currentLang].conn_err, 'ai'); });
}

document.getElementById('langBar').addEventListener('click', function(e) {
  var btn = e.target.closest('button');
  if (!btn || !btn.dataset.lang) return;
  setLang(btn.dataset.lang);
});

function openFAQ() { document.getElementById('faqModal').classList.add('open'); }
function closeFAQ() { document.getElementById('faqModal').classList.remove('open'); }

document.querySelectorAll('.lang-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.lang === currentLang); });
renderFAQ();
applyUILang();

var USER_ID = null;
var urlParams = new URLSearchParams(window.location.search);
USER_ID = urlParams.get('user_id');
try { var tg = window.Telegram?.WebApp; if (!USER_ID && tg && tg.initDataUnsafe && tg.initDataUnsafe.user) { USER_ID = tg.initDataUnsafe.user.id; } } catch(e) {}
var USER_NAME = 'You';
var USER_AVATAR = null;
if (USER_ID) {
  fetch('/api/user-info?user_id=' + USER_ID)
    .then(function(r) { return r.json(); })
    .then(function(data) { if (data.name) USER_NAME = data.name; if (data.avatar) USER_AVATAR = data.avatar; })
    .catch(function() {});
}
</script>
</body>
</html>
