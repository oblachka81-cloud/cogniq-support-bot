<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>COGNIQ Support</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  font-family: 'Inter', -apple-system, sans-serif;
  color: #ddeeff;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: stretch;
}
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: url('https://cogniqai.bothost.tech/support_bg.webp') center/cover no-repeat;
  filter: brightness(0.6) saturate(1.2);
  z-index: -1;
}
.support-card {
  max-width: 480px;
  width: 100%;
  padding: 16px 16px 0 16px;
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
.logo { text-align: center; margin-bottom: 12px; }
.logo img { height: 100px; }

/* FAQ */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: flex-start; padding-top: 60px; }
.modal-overlay.open { display: flex; }
.modal-box { background: rgba(10,20,38,0.95); backdrop-filter: blur(15px); border: 1px solid rgba(255,170,0,0.3); border-radius: 24px; padding: 20px; width: 90%; max-width: 480px; max-height: 80vh; overflow-y: auto; position: relative; }
.modal-close { position: sticky; top: 0; float: right; background: none; border: none; color: #ffaa00; font-size: 1.5rem; cursor: pointer; }
.faq-card { background: rgba(10,20,38,0.7); backdrop-filter: blur(8px); border: 1px solid rgba(255,170,0,0.2); border-radius: 20px; padding: 16px; margin-bottom: 8px; cursor: pointer; }
.faq-q { font-size: 0.9rem; font-weight: 700; color: #ffaa00; }
.faq-a { font-size: 0.82rem; color: #ccddee; line-height: 1.5; display: none; margin-top: 8px; }
.faq-card.open .faq-a { display: block; }

/* Чат */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  margin-bottom: 8px;
  padding: 8px 0;
}
.msg { margin-bottom: 8px; padding: 8px 12px; border-radius: 12px; font-size: 0.85rem; line-height: 1.4; max-width: 85%; }
.msg.user {
  background: transparent;
  margin-left: auto;
  text-align: right;
  color: #ffcc66;
  font-weight: 500;
  display: flex;
  align-items: flex-end;
  flex-direction: row;
  gap: 8px;
  border-right: 2px solid rgba(0,255,170,0.3);
  padding-right: 12px;
}
.msg.user .user-avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; }
.msg.ai { background: transparent; margin-right: auto; color: #fff; display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; max-width: 100%; }
.msg.ai .ai-avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; }
.msg.ai .ai-text { flex: 1; color: #66ccff; font-weight: 600; }
.msg.user .user-name { font-size: 0.7rem; color: #8899cc; margin-bottom: 2px; text-align: right; }

/* Поле ввода */
.chat-input-row {
  display: flex;
  gap: 8px;
  padding: 8px 0 12px 0;
  background: transparent;
  position: sticky;
  bottom: 0;
}
.chat-input {
  flex: 1; padding: 12px;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
  border: 1px solid rgba(0,255,170,0.3); border-radius: 12px;
  color: #fff; font-size: 0.9rem; outline: none;
}
.chat-input::placeholder { color: #8899cc; }
.btn {
  padding: 12px 16px; border: none; border-radius: 12px;
  color: #000; font-weight: 800; cursor: pointer;
  background: linear-gradient(90deg, #00ffaa, #00cc88);
}

/* Футер */
.support-footer {
  text-align: center;
  padding: 6px 0 10px 0;
  font-size: 0.7rem;
  color: rgba(255,255,255,0.25);
  letter-spacing: 1px;
}
</style>
</head>
<body>
<div class="support-card">
  <a href="https://t.me/NeuronGame_bot" style="position:absolute;top:16px;left:16px;z-index:2;">
    <img src="/support_back_btn.png" style="width:36px;height:36px;display:block;">
</a>

  <div class="logo"><img src="/support_avatar.png" alt="COGNIQ"></div>

  <div id="langBar" style="display:flex;gap:6px;justify-content:center;margin-bottom:8px;">
    <button data-lang="ru" style="background:none;border:none;padding:0;cursor:pointer;filter:brightness(1.3)drop-shadow(0 0 6px #f472b6);">
      <img src="/support_lang_ru.png" style="height:34px;width:auto;display:block;">
    </button>
    <button data-lang="en" style="background:none;border:none;padding:0;cursor:pointer;">
      <img src="/support_lang_en.png" style="height:34px;width:auto;display:block;">
    </button>
    <button data-lang="fr" style="background:none;border:none;padding:0;cursor:pointer;">
      <img src="/support_lang_fr.png" style="height:34px;width:auto;display:block;">
    </button>
    <button data-lang="es" style="background:none;border:none;padding:0;cursor:pointer;">
      <img src="/support_lang_es.png" style="height:34px;width:auto;display:block;">
    </button>
  </div>

  <button onclick="openFAQ()" style="background:none;border:none;padding:0;cursor:pointer;width:100%;margin-bottom:8px;">
    <img src="/support_faq_btn.png" style="width:100%;height:36px;display:block;object-fit:contain;">
</button>

  <div class="modal-overlay" id="faqModal" onclick="if(event.target===this) closeFAQ()">
    <div class="modal-box">
      <button class="modal-close" onclick="closeFAQ()">✕</button>
      <div id="faqList"></div>
    </div>
  </div>

  <div style="display:flex;gap:6px;margin-bottom:8px;">
    <button id="modeSupport" onclick="setMode('support')" style="background:none;border:none;padding:0;cursor:pointer;flex:1;filter:brightness(1.3)drop-shadow(0 0 6px #f472b6);">
      <img src="/support_mode_support.png" style="width:100%;height:auto;display:block;">
    </button>
    <button id="modeChat" onclick="setMode('chat')" style="background:none;border:none;padding:0;cursor:pointer;flex:1;">
      <img src="/support_mode_chat.png" style="width:100%;height:auto;display:block;">
    </button>
  </div>

  <div class="chat-messages" id="chatMessages"></div>

  <div class="chat-input-row">
    <input class="chat-input" id="chatInput" placeholder="Задайте вопрос...">
    <button class="btn" onclick="sendMessage()">➤</button>
  </div>

  <div class="support-footer">Официальная поддержка экосистемы NEURON &nbsp;© 2026</div>
</div>

<script>
var FAQ = {
  ru: [
    { q: '🎮 Как начать играть?', a: 'Нажмите "Играть" в главном меню. Отвечайте на 10 вопросов викторины и зарабатывайте COGNIQ за правильные ответы!' },
    { q: '🪙 Что такое COGNIQ?', a: 'COGNIQ — игровой токен экосистемы NEURON на блокчейне TON.' },
    { q: '🔥 Что такое Супер-игра?', a: 'Это режим с x15 наградами! Стоит 100 Stars или 1 USDT.' },
    { q: '💸 Как вывести COGNIQ?', a: 'Подключите TON-кошелек. Нужен 1 тикет и 1000 COGNIQ.' },
    { q: '⚡ Что такое IMPULSE?', a: 'IMPULSE — 5 игр (FORTUNA, SPARK, XXI, KRASH, MINES). Валюта: IMPULSE.' },
    { q: '💎 Чем VIP отличается от PREMIUM?', a: 'VIP (7 дней): +10 игр/день. PREMIUM (30 дней): +10 игр/день, рамка.' }
  ],
  en: [
    { q: '🎮 How to start?', a: 'Open "Play", answer quiz questions and earn COGNIQ!' },
    { q: '🪙 What is COGNIQ?', a: 'COGNIQ is the NEURON token on TON.' },
    { q: '🔥 Super Game?', a: 'x15 rewards! 100 Stars or 1 USDT.' },
    { q: '💸 How to withdraw?', a: 'Connect TON wallet. 1 ticket + 1000 COGNIQ.' },
    { q: '⚡ What is IMPULSE?', a: '5 games. Currency: IMPULSE.' },
    { q: '💎 VIP vs PREMIUM?', a: 'VIP 7d: +10 games/day. PREMIUM 30d: +10 games/day, frame.' }
  ],
  fr: [
    { q: '🎮 Comment jouer?', a: 'Ouvre "Jouer", réponds aux questions et gagne des COGNIQ!' },
    { q: '🪙 Qu\'est-ce que COGNIQ?', a: 'COGNIQ est le token NEURON sur TON.' },
    { q: '🔥 Super Jeu?', a: 'Mode x15! 100 Stars ou 1 USDT.' },
    { q: '💸 Retirer COGNIQ?', a: 'Connecte portefeuille TON. 1 ticket + 1000 COGNIQ.' },
    { q: '⚡ IMPULSE?', a: '5 jeux. Monnaie: IMPULSE.' },
    { q: '💎 VIP vs PREMIUM?', a: 'VIP 7j: +10 parties/jour. PREMIUM 30j: +10 parties/jour, cadre.' }
  ],
  es: [
    { q: '🎮 ¿Cómo jugar?', a: 'Abre "Jugar", responde preguntas y gana COGNIQ!' },
    { q: '🪙 ¿Qué es COGNIQ?', a: 'COGNIQ es el token NEURON en TON.' },
    { q: '🔥 ¿Super Juego?', a: 'Modo x15! 100 Stars o 1 USDT.' },
    { q: '💸 ¿Retirar COGNIQ?', a: 'Conecta billetera TON. 1 ticket + 1000 COGNIQ.' },
    { q: '⚡ ¿IMPULSE?', a: '5 juegos. Moneda: IMPULSE.' },
    { q: '💎 ¿VIP vs PREMIUM?', a: 'VIP 7d: +10 partidas/día. PREMIUM 30d: +10 partidas/día, marco.' }
  ]
};

var UI_STRINGS = {
  ru: { input_ph: 'Задайте вопрос...', ai_err: 'Извините, не смог ответить.', conn_err: 'Ошибка связи.', footer: 'Официальная поддержка экосистемы NEURON © 2026' },
  en: { input_ph: 'Ask a question...', ai_err: 'Sorry, could not answer.', conn_err: 'Connection error.', footer: 'Official NEURON Ecosystem Support © 2026' },
  fr: { input_ph: 'Posez une question...', ai_err: 'Désolé, pas pu répondre.', conn_err: 'Erreur de connexion.', footer: 'Support officiel NEURON © 2026' },
  es: { input_ph: 'Haz una pregunta...', ai_err: 'Lo siento, no pude responder.', conn_err: 'Error de conexión.', footer: 'Soporte oficial NEURON © 2026' }
};

var currentLang = localStorage.getItem('support_lang') || 'ru';
if (!FAQ[currentLang]) currentLang = 'ru';
var chatMode = 'support';

function setMode(mode) {
  chatMode = mode;
  document.getElementById('modeSupport').style.filter = mode === 'support' ? 'brightness(1.3) drop-shadow(0 0 6px #f472b6)' : 'brightness(0.5)';
  document.getElementById('modeChat').style.filter = mode === 'chat' ? 'brightness(1.3) drop-shadow(0 0 6px #f472b6)' : 'brightness(0.5)';
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('support_lang', lang);
  document.querySelectorAll('#langBar button').forEach(function(btn) {
    btn.style.filter = btn.dataset.lang === lang ? 'brightness(1.3) drop-shadow(0 0 6px #f472b6)' : 'none';
  });
  renderFAQ();
  applyUILang();
}

function applyUILang() {
  var str = UI_STRINGS[currentLang] || UI_STRINGS['ru'];
  document.getElementById('chatInput').placeholder = str.input_ph;
  document.title = 'COGNIQ Support';
  var footer = document.querySelector('.support-footer');
  if (footer) footer.textContent = str.footer;
}

function renderFAQ() {
  document.getElementById('faqList').innerHTML = FAQ[currentLang].map(function(item) {
    return '<div class="faq-card" onclick="this.classList.toggle(\'open\')"><div class="faq-q">' + item.q + '</div><div class="faq-a">' + item.a + '</div></div>';
  }).join('');
}

function addMessage(text, type, name, avatar) {
  var container = document.getElementById('chatMessages');
  var div = document.createElement('div');
  div.className = 'msg ' + (type || 'user');
  if (type === 'ai') {
    div.innerHTML = '<img class="ai-avatar" src="/support_avatar.png" alt="AI"><div class="ai-text">' + text + '</div>';
  } else {
   div.innerHTML = (avatar ? '<img class="user-avatar" src="' + avatar + '" style="order:2;">' : '') + '<div style="flex:1;">' + (name ? '<div class="user-name">' + name + '</div>' : '') + text + '</div>'; 
  }
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function sendMessage() {
  var input = document.getElementById('chatInput');
  var msg = input.value.trim();
  if (!msg) return;
  addMessage(msg, 'user', USER_NAME, USER_AVATAR);
  input.value = '';
  fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: msg, lang: currentLang, mode: chatMode }) })
    .then(function(r) { return r.json(); })
    .then(function(data) { addMessage(data.reply || UI_STRINGS[currentLang].ai_err, 'ai'); })
    .catch(function() { addMessage(UI_STRINGS[currentLang].conn_err, 'ai'); });
}

document.getElementById('langBar').addEventListener('click', function(e) {
  var btn = e.target.closest('button');
  if (!btn || !btn.dataset.lang) return;
  setLang(btn.dataset.lang);
});

function openFAQ() { document.getElementById('faqModal').classList.add('open'); }
function closeFAQ() { document.getElementById('faqModal').classList.remove('open'); }

renderFAQ();
applyUILang();

var USER_ID = null;
var urlParams = new URLSearchParams(window.location.search);
USER_ID = urlParams.get('user_id');
try {
  var tg = window.Telegram?.WebApp;
  if (!USER_ID && tg?.initDataUnsafe?.user) {
    USER_ID = tg.initDataUnsafe.user.id;
  }
} catch(e) {}

// Если не из Telegram — блокируем
if (!USER_ID) {
  document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#fff;font-family:sans-serif;text-align:center;background:#0a0a0f;"><div><h1>🚫</h1><p>Доступ только через NEURON</p><p><a href="https://t.me/NeuronGame_bot" style="color:#00ffaa;text-decoration:none;font-weight:700;">🚀 Открыть в NEURON</a></p></div></div>';
  throw new Error('Access denied');
}

// Проверяем, есть ли юзер в базе NEURON
fetch('https://neuron1.bothost.tech/api/check-user?user_id=' + USER_ID)
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (!data.exists) {
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#fff;font-family:sans-serif;text-align:center;background:#0a0a0f;"><div><h1>🚫</h1><p>Доступ только через NEURON</p><p><a href="https://t.me/NeuronGame_bot" style="color:#00ffaa;text-decoration:none;font-weight:700;">🚀 Открыть в NEURON</a></p></div></div>';
    }
  })
  .catch(function() {});

var USER_NAME = 'You';
var USER_AVATAR = null;
if (USER_ID) {
  fetch('/api/user-info?user_id=' + USER_ID)
    .then(r => r.json())
    .then(d => { if (d.name) USER_NAME = d.name; if (d.avatar) USER_AVATAR = d.avatar; })
    .catch(() => {});
}
</script>
</body>
</html>
